<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Donuts!</h1>

    <form id="donut-form">
      <hr />
      <label>
        Order a Donut
        <select name="type">
          <option value="glazed">Glazed Donut</option>
          <option value="jelly">Jelly Donut</option>
          <option value="boston">Boston Cream</option>
          <option value="sprinkle">Strawberry Sprinkle Donut</option>
        </select>
      </label>
      <button type="submit">Order</button>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      var donutImages = {
        glazed: "https://daylightdonutsstgeorge.com/wp-content/uploads/2023/06/Raised-Glazed.jpg",
        jelly: "https://static01.nyt.com/images/2014/12/14/magazine/14eat4/14eat4-superJumbo.jpg",
        boston: "https://i0.wp.com/www.onegreenplanet.org/wp-content/uploads/2020/03/screen-shot-2020-03-30-at-12-35-21-pm.png?fit=763%2C657&ssl=1",
        sprinkle: "https://media.wawa.com/i/wawa/DM_2403_DS_MA_Strawberry_Frosted_Sprinkle_Donut_REV1_092?w=300&fmt=auto&fmt.jpeg.interlaced=true&qlt=default&filter=s&strip=true&upscale=true"
      };

      $("#donut-form").on("submit", function (event) {
        event.preventDefault();

        var $donutType = $(this).find("[name=type]"); 
        var donutType = $donutType.val();
        var $img = $("<img>");
        $img.width(100);
        $img.attr("src", donutImages[donutType]);
        $img.appendTo("body");
        
        
        
        
      });
    </script>
  </body>
</html>
